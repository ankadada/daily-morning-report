name: Daily Morning Report

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 00:00 = 北京时间 08:00
  workflow_dispatch:      # 支持手动触发

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate report
        id: report
        env:
          CITY: ${{ secrets.CITY || '深圳' }}
        run: |
          python scripts/generate_report.py --city $CITY > /tmp/report.json
          echo "report<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/report.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send via webhook
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          echo '${{ steps.report.outputs.report }}' | python scripts/send_webhook.py --stdin
